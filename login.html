<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paaila Login</title>
</head>
<style>
   body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0f172a; /* Darker, modern background */
        background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
        background-size: 40px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center; /* Centered perfectly */
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .logincard {
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 320px;
        text-align: center;
    }

    .logincard h1 {
        margin-top: 0;
        margin-bottom: 2rem;
        color: #1a1a1a;
        font-weight: 800;
        letter-spacing: -1px; /* Tighter, fashion-brand look */
        text-transform: uppercase;
    }

    /* Target your inputs specifically */
    input[type="text"], input[type="password"] {
        border-radius: 8px;
        padding: 12px 15px;
        margin: 8px 0;
        width: 280px; /* Adjusted to fit nicely in the 320px card */
        border: 2px solid #e2e8f0;
        transition: all 0.3s ease;
        outline: none;
    }

    input:focus {
        border-color: #6b27ff;
        box-shadow: 0 0 0 3px rgba(107, 39, 255, 0.2);
    }

    button {
        margin-top: 10px;
        padding: 14px;
        border: none;
        background-color: #1a1a1a;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        width: 100%; /* Spans across the input width */
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: transform 0.2s;
    }

    button:hover {
        background-color: #000;
        transform: translateY(-1px);
    }

 /* The bottom text and link */
    p {
        margin-top: 25px;
        color: #cbd5e1; /* Much lighter blue-grey for better readability */
        font-size: 14px;
        font-weight: 500;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5); /* Adds a tiny bit of contrast */
    }

    a {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 24px;
        color: white;
        text-decoration: none;
        background: linear-gradient(135deg, #6b27ff 0%, #4f46e5 100%);
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 12px rgba(107, 39, 255, 0.3);
        transition: all 0.3s ease;
    }

    a:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(107, 39, 255, 0.5);
        opacity: 1;
    }
</style>
<body>
    
    <div class="logincard">
        <img src="paaila.png" alt="Paaila Logo" style="width: 150px; border-radius: 20px; ">
    
    <!-- The form submits to login.php -->
   <form action="login.php" method="post" autocomplete="off">
    <!-- Dummy fields to trick browser -->
    <input type="text" style="display:none">
    <input type="password" style="display:none">

    <!-- Real login fields -->
    <input type="text" name="username" placeholder="Username" autocomplete="off" required><br><br>
    <input type="password" name="password" placeholder="Password" autocomplete="new-password" required><br><br>
    <button name="login" type="submit">Login</button>
</form>
</div>

    <p>Don't have an account? <br><br><a href="register.php">Register here</a></p>
</body>
</html>
